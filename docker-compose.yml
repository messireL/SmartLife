name: ${SMARTLIFE_COMPOSE_PROJECT_NAME:-smartlife}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SMARTLIFE_DB_NAME:-smartlife}
      POSTGRES_USER: ${SMARTLIFE_DB_USER:-smartlife}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - smartlife_postgres_data:/var/lib/postgresql/data
      - ./secrets/db_password:/run/secrets/db_password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - smartlife_network

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      SMARTLIFE_APP_NAME: ${SMARTLIFE_APP_NAME:-SmartLife}
      SMARTLIFE_APP_HOST: ${SMARTLIFE_APP_HOST:-0.0.0.0}
      SMARTLIFE_APP_PORT: ${SMARTLIFE_APP_PORT:-18089}
      SMARTLIFE_APP_BASE_URL: ${SMARTLIFE_APP_BASE_URL:-http://192.168.1.100:13443}
      SMARTLIFE_NETWORK_MODE: ${SMARTLIFE_NETWORK_MODE:-lan}
      SMARTLIFE_LAN_ONLY: ${SMARTLIFE_LAN_ONLY:-yes}
      SMARTLIFE_BIND_IP: ${SMARTLIFE_BIND_IP:-192.168.1.100}
      SMARTLIFE_PUBLIC_PORT: ${SMARTLIFE_PUBLIC_PORT:-13443}
      SMARTLIFE_PROVIDER: ${SMARTLIFE_PROVIDER:-demo}
      SMARTLIFE_TUYA_BASE_URL: ${SMARTLIFE_TUYA_BASE_URL:-https://openapi.tuyaeu.com}
      SMARTLIFE_SYNC_INTERVAL_SECONDS: ${SMARTLIFE_SYNC_INTERVAL_SECONDS:-60}
      SMARTLIFE_BACKGROUND_SYNC_ENABLED: ${SMARTLIFE_BACKGROUND_SYNC_ENABLED:-yes}
      SMARTLIFE_SYNC_ON_STARTUP: ${SMARTLIFE_SYNC_ON_STARTUP:-yes}
      SMARTLIFE_XIAOMI_REGION: ${SMARTLIFE_XIAOMI_REGION:-cn}
      SMARTLIFE_XIAOMI_DEVICE_IP: ${SMARTLIFE_XIAOMI_DEVICE_IP:-}
      SMARTLIFE_TIMEZONE: ${SMARTLIFE_TIMEZONE:-Europe/Moscow}
      SMARTLIFE_DB_NAME: ${SMARTLIFE_DB_NAME:-smartlife}
      SMARTLIFE_DB_USER: ${SMARTLIFE_DB_USER:-smartlife}
      SMARTLIFE_DB_HOST: ${SMARTLIFE_DB_HOST:-db}
      SMARTLIFE_DB_PORT: ${SMARTLIFE_DB_PORT:-5432}
    labels:
      com.smartlife.project: ${SMARTLIFE_COMPOSE_PROJECT_NAME:-smartlife}
      com.smartlife.stack: smartlife
    volumes:
      - ./secrets:/app/secrets:ro
      - ./backups:/app/backups
    ports:
      - "${SMARTLIFE_BIND_IP:-0.0.0.0}:${SMARTLIFE_PUBLIC_PORT:-13443}:${SMARTLIFE_APP_PORT:-18089}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${SMARTLIFE_APP_PORT:-18089}/favicon.ico >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartlife_network

volumes:
  smartlife_postgres_data:
    name: ${SMARTLIFE_COMPOSE_PROJECT_NAME:-smartlife}_postgres_data

networks:
  smartlife_network:
    name: ${SMARTLIFE_COMPOSE_PROJECT_NAME:-smartlife}_network
