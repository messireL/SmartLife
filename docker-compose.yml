services:
  db:
    image: postgres:16-alpine
    container_name: smartlife-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartlife
      POSTGRES_USER: smartlife
      POSTGRES_PASSWORD: smartlife
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartlife -d smartlife"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: smartlife-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "18089:18089"
    depends_on:
      db:
        condition: service_healthy
