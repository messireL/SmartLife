name: ${SMARTLIFE_COMPOSE_PROJECT_NAME:-smartlife}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SMARTLIFE_DB_NAME:-smartlife}
      POSTGRES_USER: ${SMARTLIFE_DB_USER:-smartlife}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - smartlife_postgres_data:/var/lib/postgresql/data
      - ./secrets/db_password:/run/secrets/db_password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - smartlife_network

  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./backups:/app/backups
    ports:
      - "${SMARTLIFE_BIND_IP:-0.0.0.0}:${SMARTLIFE_PUBLIC_PORT:-13443}:${SMARTLIFE_APP_PORT:-18089}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${SMARTLIFE_APP_PORT:-18089}/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartlife_network

volumes:
  smartlife_postgres_data:
    name: ${SMARTLIFE_COMPOSE_PROJECT_NAME:-smartlife}_postgres_data

networks:
  smartlife_network:
    name: ${SMARTLIFE_COMPOSE_PROJECT_NAME:-smartlife}_network
